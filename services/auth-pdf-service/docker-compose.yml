version: "3.9"

# Shared environment variables across all services
x-common-env: &common-env
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY}

services:

  # =========================
  # Auth Service — port 8001
  # =========================
  auth-service:
    build: ./auth-service
    ports:
      - "8001:8001"
    environment:
      <<: *common-env
    restart: unless-stopped

  # =========================
  # PDF Service — port 8002
  # =========================
  pdf-service:
    build: ./pdf-service
    ports:
      - "8002:8002"
    environment:
      <<: *common-env
      AUTH_SERVICE_URL: http://auth-service:8001
    depends_on:
      - auth-service
    restart: unless-stopped

  # =========================
  # RAG Service — port 8003
  # =========================
  rag-service:
    build: ./rag-service
    ports:
      - "8003:8003"
    environment:
      <<: *common-env
      AUTH_SERVICE_URL: http://auth-service:8001
      PDF_SERVICE_URL: http://pdf-service:8002
    depends_on:
      - auth-service
      - pdf-service
    restart: unless-stopped

  # =========================
  # Chat Service — port 8004
  # =========================
  chat-service:
    build: ./chat-service
    ports:
      - "8004:8004"
    environment:
      <<: *common-env
      AUTH_SERVICE_URL: http://auth-service:8001
      RAG_SERVICE_URL: http://rag-service:8003
    depends_on:
      - auth-service
      - rag-service
    restart: unless-stopped

  # =========================
  # Frontend — port 8501
  # =========================
  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      PDF_SERVICE_URL: http://pdf-service:8002
      RAG_SERVICE_URL: http://rag-service:8003
      CHAT_SERVICE_URL: http://chat-service:8004
    depends_on:
      - auth-service
      - pdf-service
      - rag-service
      - chat-service
    restart: unless-stopped
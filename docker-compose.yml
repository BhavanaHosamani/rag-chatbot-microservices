

x-common-env: &common-env
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
  OPENAI_API_KEY: ${OPENROUTER_API_KEY}

services:

  auth-service:
    build: ./services/auth-pdf-service/auth-service
    ports:
      - "8001:8001"
    environment:
      <<: *common-env
    restart: unless-stopped

  pdf-service:
    build: ./services/auth-pdf-service/pdf-service
    ports:
      - "8002:8002"
    environment:
      <<: *common-env
      AUTH_SERVICE_URL: http://auth-service:8001
    depends_on:
      - auth-service
    restart: unless-stopped

  rag-service:
    build: ./services/auth-pdf-service/rag-service
    ports:
      - "8003:8003"
    environment:
      <<: *common-env
      AUTH_SERVICE_URL: http://auth-service:8001
      PDF_SERVICE_URL: http://pdf-service:8002
    depends_on:
      - auth-service
      - pdf-service
    restart: unless-stopped

  chat-service:
    build: ./services/auth-pdf-service/chat-service
    ports:
      - "8004:8004"
    environment:
      <<: *common-env
      AUTH_SERVICE_URL: http://auth-service:8001
      RAG_SERVICE_URL: http://rag-service:8003
    depends_on:
      - auth-service
      - rag-service
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      PDF_SERVICE_URL: http://pdf-service:8002
      RAG_SERVICE_URL: http://rag-service:8003
      CHAT_SERVICE_URL: http://chat-service:8004
    depends_on:
      - auth-service
      - pdf-service
      - rag-service
      - chat-service
    restart: unless-stopped